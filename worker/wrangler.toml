# Cloudflare Worker Configuration for PromptUp
# Documentation: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "promptlab"
main = "worker.js"
compatibility_date = "2024-01-01"

# Account ID (required for deployment)
# Get your account ID from: https://dash.cloudflare.com -> Workers & Pages -> Overview
# account_id = "your-account-id-here"

# KV Namespaces for rate limiting
# Create KV namespace: wrangler kv:namespace create "RATE_LIMIT_KV"
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "f8b12d4d4d5a49e5b0fe87c36f9e16a0"

# Environment variables (set in wrangler secret for security)
# Run: wrangler secret put GEMINI_API_KEY
# Run: wrangler secret put ALLOWED_ORIGINS
#
# Example ALLOWED_ORIGINS value:
# "http://localhost:*,https://promptup.cloud,https://www.promptup.cloud,https://promptailab.netlify.app"

# Routes (optional - for custom domain)
# routes = [
#   { pattern = "api.promptup.cloud/*", zone_name = "promptup.cloud" }
# ]

# Build configuration
[build]
command = ""
